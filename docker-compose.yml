version: '3.8'

services:
  # PostgreSQL Database (optional for demo)
  postgres:
    image: postgres:15-alpine
    container_name: gulfvista-db
    environment:
      POSTGRES_USER: gulfvista
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: gulfvista_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gulfvista"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - gulfvista-network

  # Backend API - Phase 2 Full Features
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gulfvista-api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://gulfvista:secure_password_123@postgres:5432/gulfvista_dev
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "False"
    volumes:
      - ./backend:/app
    command: uvicorn main_simple:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - gulfvista-network

  # Frontend - Simple HTTP Server
  frontend:
    image: nginx:alpine
    container_name: gulfvista-web
    ports:
      - "5173:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - gulfvista-network

networks:
  gulfvista-network:
    driver: bridge

volumes:
  postgres_data:
