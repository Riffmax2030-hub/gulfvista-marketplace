# GulfVista Marketplace - Docker Compose Configuration for Production

version: '3.8'

services:
  # PostgreSQL Database (optional for local development with docker)
  postgres:
    image: postgres:15-alpine
    container_name: gulfvista-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Iamgreat@2030
      POSTGRES_DB: gulfvista_dev
    ports:
      - "5432:5432"
    volumes:
      - gulfvista-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gulfvista-network

  # Backend API - Production Ready
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gulfvista-api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # In production, use Railway or Docker secrets for these
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:Iamgreat@2030@postgres:5432/gulfvista_dev}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      REELLY_API_KEY: ${REELLY_API_KEY}
      DEBUG: "False"
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - gulfvista-network
    restart: unless-stopped

  # Frontend - Production with Nginx
  frontend:
    image: node:20-alpine as builder
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm ci && npm run build"

  nginx:
    image: nginx:alpine
    container_name: gulfvista-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - gulfvista-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  gulfvista-db-data:

networks:
  gulfvista-network:
    driver: bridge
